version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: galaga_db
      MYSQL_USER: galaga
      MYSQL_PASSWORD: galaga_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: galaga
      DB_PASSWORD: galaga_pass
      DB_NAME: galaga_db
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_WS_URL: ws://localhost:4000
        REACT_APP_API_URL: http://localhost:4000
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
